<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parkhaus Monitor</title>
<style>
    body { 
        font-family: 'Segoe UI', sans-serif; 
        background: #1f1f1f; 
        color: white; 
        padding: 50px; 
    }
    .parkplatz-layout { 
        display: flex; 
        gap: 30px; 
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
    }
    .parkplatz-card { 
        background: #2d2d2d; 
        padding: 30px; 
        padding-bottom: 60px; 
        border-radius: 15px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        width: 250px;
        text-align: center;
        transition: transform 0.2s;
    }
    .parkplatz-card h1 { 
        color: #00d4ff; 
        font-size: 1.5rem;
        margin-bottom: 20px;
    }
    .status-text { 
        font-size: 24px; 
        font-weight: bold;
        display: block;
    }
    .parkplatz-card.frei .status-text { color: #4caf50; }
    .parkplatz-card.belegt .status-text { color: #f44336; }
    .parkplatz-card.warte .status-text { color: #ffeb3b; }

    .zusammenfassung {
        text-align: center;
        margin-bottom: 30px;
        font-size: 1.2rem;
        color: #aaa;
    }
    .zusammenfassung span {
        font-weight: bold;
        color: #00d4ff;
        font-size: 1.5rem;
    }

    button { 
        background: #00d4ff; 
        border: none; 
        padding: 15px 30px; 
        border-radius: 8px; 
        font-weight: bold; 
        cursor: pointer; 
        margin-top: 30px;
        margin-right: 10px;
        color: #000;
    }
    button:hover { background: #008fb3; }

    .demo-banner {
        display: inline-block;
        background: #ffeb3b;
        color: #000;
        font-weight: bold;
        font-size: 0.8rem;
        letter-spacing: 2px;
        padding: 5px 14px;
        border-radius: 20px;
        margin-bottom: 24px;
    }

    .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 30px;
        font-size: 0.9rem;
        color: #aaa;
    }
    .dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #ffeb3b;
        animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<div class="demo-banner">⚡ DEMO MODUS</div>

<div class="status-bar">
    <div class="dot"></div>
    <span>Simulation aktiv — kein Arduino verbunden</span>
</div>

<div class="zusammenfassung">
    Freie Plätze: <span id="frei-gesamt">2</span> / 2
</div>

<div class="parkplatz-layout">
    <div id="p1" class="parkplatz-card frei">
        <h1>Parkplatz 1</h1>
        <span class="status-text">FREI</span>
    </div>

    <div id="p2" class="parkplatz-card frei">
        <h1>Parkplatz 2</h1>
        <span class="status-text">FREI</span>
    </div>
</div>

<div>
    <button id="btn-simulate">▶ Test-Daten senden</button>
</div>

<script>
const simStates = [
    { P1: 'FREI',   P2: 'FREI'   },
    { P1: 'BELEGT', P2: 'FREI'   },
    { P1: 'FREI',   P2: 'BELEGT' },
    { P1: 'BELEGT', P2: 'BELEGT' },
];
let simIndex = 0;

function updateCard(id, status) {
    const card = document.getElementById(id);
    if (!card) return;
    card.className = 'parkplatz-card ' + (status === 'FREI' ? 'frei' : 'belegt');
    card.querySelector('.status-text').innerText = status;
}

function updateFrei() {
    const p1frei = document.getElementById('p1').classList.contains('frei');
    const p2frei = document.getElementById('p2').classList.contains('frei');
    document.getElementById('frei-gesamt').textContent = (p1frei ? 1 : 0) + (p2frei ? 1 : 0);
}

document.getElementById('btn-simulate').onclick = () => {
    const s = simStates[simIndex % simStates.length];
    simIndex++;
    updateCard('p1', s.P1);
    updateCard('p2', s.P2);
    updateFrei();
};
</script>

</body>
</html>
